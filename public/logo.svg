<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300" height="100">
  <defs>
    <!-- Main gradient - purple to pink -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>

    <!-- Text gradient for ENTIRE -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer circle/arc -->
  <circle cx="45" cy="50" r="38" fill="none" stroke="url(#mainGrad)" stroke-width="4" opacity="0.9"/>

  <!-- Inner circle background -->
  <circle cx="45" cy="50" r="32" fill="url(#mainGrad)" opacity="0.15"/>

  <!-- e letter inside circle -->
  <text x="45" y="62" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="url(#mainGrad)" text-anchor="middle" filter="url(#glow)">e</text>

  <!-- ENTIRE text -->
  <text x="100" y="48" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="900" fill="url(#textGrad)" letter-spacing="2">ENTIRE</text>

  <!-- SOLUTIONS text -->
  <text x="100" y="72" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#a855f7" letter-spacing="4">SOLUTIONS</text>
</svg>